name = "plain-hill-28ab"
main = "src/index.js"
compatibility_date = "2026-04-28"
preview_urls = false

# KV namespace for OAuth tokens, refresh tokens, user config
[[kv_namespaces]]
binding = "TOKENS"
id = "9235bf7000194c89ad4c544a95febc4c"

# D1 database for check-ins, scheduling proposals, audit log
[[d1_databases]]
binding = "DB"
database_name = "life-system-db"
database_id = "ee876af9-61ba-4f96-8123-447815fb9850"

# Secrets (set out-of-band via `wrangler secret put <NAME>`, never committed):
#   TRAINING_LOG_TOKEN  — bearer token for /api/training-log/* routes
#   MCP_CLIENT_ID       — pre-shared OAuth client_id for the MCP server
#   MCP_CLIENT_SECRET   — pre-shared OAuth client_secret for the MCP server
